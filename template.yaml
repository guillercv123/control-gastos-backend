AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Control de Gastos - Backend Node.js + TypeScript (Fase 2 - Cognito)"

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 128
    Architectures:
      - arm64
    Environment:
      Variables:
        SERVICE_NAME: control-gastos-backend
        STAGE: dev
        TABLE_NAME: !Ref GastosTable

Resources:

  # ===================== Autenticacion (Cognito) =====================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: control-gastos-users
      UsernameAttributes:           # el usuario inicia sesion con su email
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: control-gastos-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false         # app publica (SPA): sin secreto
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH  # login usuario+contrasena (y pruebas por CLI)
        - ALLOW_USER_SRP_AUTH       # login seguro (lo usara Angular)
        - ALLOW_REFRESH_TOKEN_AUTH

  # ===================== API con autorizador JWT =====================
  GastosHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoAuthorizer   # todo protegido por defecto

  # ===================== Base de datos =====================
  GastosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: control-gastos
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ===================== Lambdas =====================
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-health
      CodeUri: .
      Handler: getHealth.handler
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE        # /health queda PUBLICO
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/health/getHealth.ts

  CrearGastoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-crear-gasto
      CodeUri: .
      Handler: createGasto.handler
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref GastosTable
      Events:
        PostGasto:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi      # protegido (autorizador por defecto)
            Path: /gastos
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/createGasto.ts

  ListarGastosFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-listar-gastos
      CodeUri: .
      Handler: listGastos.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
      Events:
        GetGastos:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /gastos
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/listGastos.ts

  ObtenerGastoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-obtener-gasto
      CodeUri: .
      Handler: getGasto.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
      Events:
        GetGasto:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /gastos/{id}
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/getGasto.ts

  EliminarGastoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-eliminar-gasto
      CodeUri: .
      Handler: deleteGasto.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
              Resource: !GetAtt GastosTable.Arn
      Events:
        DeleteGasto:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /gastos/{id}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/deleteGasto.ts

  ActualizarGastoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-actualizar-gasto
      CodeUri: .
      Handler: updateGasto.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt GastosTable.Arn
      Events:
        PatchGasto:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /gastos/{id}
            Method: PATCH
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/updateGasto.ts

  CrearReglaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-crear-regla
      CodeUri: .
      Handler: createRegla.handler
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref GastosTable
      Events:
        PostRegla:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /reglas
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/reglas/createRegla.ts

  ListarReglasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-listar-reglas
      CodeUri: .
      Handler: listReglas.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
      Events:
        GetReglas:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /reglas
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/reglas/listReglas.ts

  EliminarReglaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-eliminar-regla
      CodeUri: .
      Handler: deleteRegla.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
              Resource: !GetAtt GastosTable.Arn
      Events:
        DeleteRegla:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /reglas/{id}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/reglas/deleteRegla.ts

  SugerirFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-sugerir-categoria
      CodeUri: .
      Handler: sugerir.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
      Events:
        PostSugerir:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /reglas/sugerir
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/reglas/sugerir.ts

Outputs:
  ApiBaseUrl:
    Description: URL base de la API
    Value: !Sub "https://${GastosHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  HealthUrl:
    Description: Endpoint de salud (publico)
    Value: !Sub "https://${GastosHttpApi}.execute-api.${AWS::Region}.amazonaws.com/health"
  GastosUrl:
    Description: Endpoint de gastos (requiere token)
    Value: !Sub "https://${GastosHttpApi}.execute-api.${AWS::Region}.amazonaws.com/gastos"
  ReglasUrl:
      Description: Endpoint de reglas (requiere token)
      Value: !Sub "https://${GastosHttpApi}.execute-api.${AWS::Region}.amazonaws.com/reglas"
  UserPoolId:
    Description: ID del User Pool de Cognito
    Value: !Ref UserPool
  UserPoolClientId:
    Description: ID del App Client (para login y obtener token)
    Value: !Ref UserPoolClient
