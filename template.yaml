AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Control de Gastos - Backend Node.js + TypeScript"
Parameters:
  AlertEmail:
    Type: String
    Default: guillercv123@gmail.com
    Description: Correo para recibir alertas

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 128
    Architectures:
      - arm64
    Environment:
      Variables:
        SERVICE_NAME: control-gastos-backend
        STAGE: dev
        TABLE_NAME: !Ref GastosTable

Resources:

  # ===================== Autenticacion (Cognito) =====================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: control-gastos-users
      UsernameAttributes:           # el usuario inicia sesion con su email
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: control-gastos-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false         # app publica (SPA): sin secreto
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH  # login usuario+contrasena (y pruebas por CLI)
        - ALLOW_USER_SRP_AUTH       # login seguro (lo usara Angular)
        - ALLOW_REFRESH_TOKEN_AUTH

  # ===================== API con autorizador JWT =====================
  GastosHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - http://localhost:4200
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoAuthorizer   # todo protegido por defecto

  # ===================== Base de datos =====================
  GastosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: control-gastos
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: control-gastos-alertas

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref AlertEmail
      TopicArn: !Ref AlertTopic

  # ===================== Lambdas =====================
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-health
      CodeUri: .
      Handler: getHealth.handler
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE        # /health queda PUBLICO
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/health/getHealth.ts

  CrearGastoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-crear-gasto
      CodeUri: .
      Handler: createGasto.handler
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref GastosTable
      Events:
        PostGasto:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi      # protegido (autorizador por defecto)
            Path: /gastos
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/createGasto.ts

  ListarGastosFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-listar-gastos
      CodeUri: .
      Handler: listGastos.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
      Events:
        GetGastos:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /gastos
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/listGastos.ts

  ObtenerGastoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-obtener-gasto
      CodeUri: .
      Handler: getGasto.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
      Events:
        GetGasto:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /gastos/{id}
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/getGasto.ts

  EliminarGastoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-eliminar-gasto
      CodeUri: .
      Handler: deleteGasto.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
              Resource: !GetAtt GastosTable.Arn
      Events:
        DeleteGasto:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /gastos/{id}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/deleteGasto.ts

  ActualizarGastoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-actualizar-gasto
      CodeUri: .
      Handler: updateGasto.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt GastosTable.Arn
      Events:
        PatchGasto:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /gastos/{id}
            Method: PATCH
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/updateGasto.ts

  CrearReglaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-crear-regla
      CodeUri: .
      Handler: createRegla.handler
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref GastosTable
      Events:
        PostRegla:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /reglas
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/reglas/createRegla.ts

  ListarReglasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-listar-reglas
      CodeUri: .
      Handler: listReglas.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
      Events:
        GetReglas:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /reglas
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/reglas/listReglas.ts

  EliminarReglaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-eliminar-regla
      CodeUri: .
      Handler: deleteRegla.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
              Resource: !GetAtt GastosTable.Arn
      Events:
        DeleteRegla:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /reglas/{id}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/reglas/deleteRegla.ts

  SugerirFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-sugerir-categoria
      CodeUri: .
      Handler: sugerir.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
      Events:
        PostSugerir:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /reglas/sugerir
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/reglas/sugerir.ts

  ResumenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-resumen
      CodeUri: .
      Handler: getResumen.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
      Events:
        GetResumen:
          Type: HttpApi
          Properties:
            ApiId: !Ref GastosHttpApi
            Path: /resumen
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/resumen/getResumen.ts

  ProcesarGastosStreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-procesar-stream
      CodeUri: .
      Handler: procesarGastos.handler
      Environment:
        Variables:
          ALERT_TOPIC_ARN: !Ref AlertTopic
          UMBRAL_ALERTA_MENSUAL: '100'
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AlertTopic.TopicName
      Events:
        Stream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt GastosTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/stream/procesarGastos.ts

  ReporteMensualFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-reporte-mensual
      CodeUri: .
      Handler: reporteMensual.handler
      Timeout: 30
      Environment:
        Variables:
          ALERT_TOPIC_ARN: !Ref AlertTopic
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AlertTopic.TopicName
      Events:
        Mensual:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: 'cron(0 8 1 * ? *)'
            ScheduleExpressionTimezone: America/Lima
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/scheduled/reporteMensual.ts

  ImportDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: control-gastos-import-dlq
      MessageRetentionPeriod: 1209600


  ImportQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: control-gastos-import
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ImportDLQ.Arn
        maxReceiveCount: 3


  ImportQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ImportQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3SendMessage
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt ImportQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub 'arn:aws:s3:::control-gastos-imports-${AWS::AccountId}'

  ImportBucket:
    Type: AWS::S3::Bucket
    DependsOn: ImportQueuePolicy
    Properties:
      BucketName: !Sub 'control-gastos-imports-${AWS::AccountId}'
      NotificationConfiguration:
        QueueConfigurations:
          - Event: 's3:ObjectCreated:*'
            Queue: !GetAtt ImportQueue.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: '.csv'

  ImportarGastosFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-importar
      CodeUri: .
      Handler: importarGastos.handler
      Timeout: 30
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref GastosTable
        - S3ReadPolicy:
            BucketName: !Sub 'control-gastos-imports-${AWS::AccountId}'
      Events:
        Cola:
          Type: SQS
          Properties:
            Queue: !GetAtt ImportQueue.Arn
            BatchSize: 1
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/sqs/importarGastos.ts
Outputs:
  ApiBaseUrl:
    Description: URL base de la API
    Value: !Sub "https://${GastosHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  HealthUrl:
    Description: Endpoint de salud (publico)
    Value: !Sub "https://${GastosHttpApi}.execute-api.${AWS::Region}.amazonaws.com/health"
  GastosUrl:
    Description: Endpoint de gastos (requiere token)
    Value: !Sub "https://${GastosHttpApi}.execute-api.${AWS::Region}.amazonaws.com/gastos"
  ReglasUrl:
    Description: Endpoint de reglas (requiere token)
    Value: !Sub "https://${GastosHttpApi}.execute-api.${AWS::Region}.amazonaws.com/reglas"
  ResumenUrl:
    Description: Endpoint de resumen (requiere token)
    Value: !Sub "https://${GastosHttpApi}.execute-api.${AWS::Region}.amazonaws.com/resumen"
  UserPoolId:
    Description: ID del User Pool de Cognito
    Value: !Ref UserPool
  ImportBucketName:
    Description: Bucket donde subir los CSV (imports/<userId>/archivo.csv)
    Value: !Sub 'control-gastos-imports-${AWS::AccountId}'
  UserPoolClientId:
    Description: ID del App Client (para login y obtener token)
    Value: !Ref UserPoolClient
