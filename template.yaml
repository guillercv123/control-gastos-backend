AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Control de Gastos - Backend Node.js + TypeScript (Fase 1 - gastos)"

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 128
    Architectures:
      - arm64                       # Graviton: mas barato y rapido
    Environment:
      Variables:
        SERVICE_NAME: control-gastos-backend
        STAGE: dev
        TABLE_NAME: !Ref GastosTable   # nombre real de la tabla, inyectado a cada Lambda

Resources:

  # ===================== Base de datos =====================
  GastosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: control-gastos
      BillingMode: PAY_PER_REQUEST    # On-Demand: $0 cuando nadie lo usa
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH               # USER#<userId>
        - AttributeName: SK
          KeyType: RANGE              # GASTO#<ulid>
      GlobalSecondaryIndexes:
        - IndexName: GSI1             # consultas por mes
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH           # USER#<userId>#<YYYY-MM>
            - AttributeName: GSI1SK
              KeyType: RANGE          # <fecha>#<ulid>
          Projection:
            ProjectionType: ALL

  # ===================== Lambdas =====================
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-health
      CodeUri: .
      Handler: getHealth.handler
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            Path: /health
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/health/getHealth.ts

  CrearGastoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-crear-gasto
      CodeUri: .
      Handler: createGasto.handler
      Policies:
        - DynamoDBWritePolicy:        # permiso minimo: solo escritura
            TableName: !Ref GastosTable
      Events:
        PostGasto:
          Type: HttpApi
          Properties:
            Path: /gastos
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/createGasto.ts

  ListarGastosFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-listar-gastos
      CodeUri: .
      Handler: listGastos.handler
      Policies:
        - DynamoDBReadPolicy:         # permiso minimo: solo lectura (incluye indices)
            TableName: !Ref GastosTable
      Events:
        GetGastos:
          Type: HttpApi
          Properties:
            Path: /gastos
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/listGastos.ts

  ObtenerGastoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: control-gastos-obtener-gasto
      CodeUri: .
      Handler: getGasto.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GastosTable
      Events:
        GetGasto:
          Type: HttpApi
          Properties:
            Path: /gastos/{id}
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Sourcemap: true
        Target: es2022
        EntryPoints:
          - src/handlers/gastos/getGasto.ts

Outputs:
  ApiBaseUrl:
    Description: URL base de la API
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  HealthUrl:
    Description: Endpoint de salud
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/health"
  GastosUrl:
    Description: Endpoint de gastos
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/gastos"
  TableName:
    Description: Nombre de la tabla DynamoDB
    Value: !Ref GastosTable